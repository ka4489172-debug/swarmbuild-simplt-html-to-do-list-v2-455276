<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    #task-input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #task-input:focus {
      border-color: #6366f1;
    }

    #add-btn {
      padding: 10px 20px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #add-btn:hover {
      background: #4f46e5;
    }

    #add-btn:active {
      background: #4338ca;
    }

    #task-list {
      list-style: none;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #f9fafb;
      margin-bottom: 10px;
      transition: background 0.15s;
    }

    .task-item:hover {
      background: #f3f4f6;
    }

    .task-item.completed .task-title {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .complete-btn {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #d1d5db;
      background: transparent;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .complete-btn:hover {
      border-color: #6366f1;
    }

    .task-item.completed .complete-btn {
      background: #6366f1;
      border-color: #6366f1;
    }

    .complete-btn::after {
      content: '';
      display: none;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .task-item.completed .complete-btn::after {
      display: block;
    }

    .task-title {
      flex: 1;
      font-size: 0.95rem;
      color: #374151;
      word-break: break-word;
    }

    .delete-btn {
      flex-shrink: 0;
      background: transparent;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      color: #ef4444;
      background: #fef2f2;
    }

    .empty-msg {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 24px 0;
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px 16px;
      }

      h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do List</h1>
    <div class="input-row">
      <input
        type="text"
        id="task-input"
        placeholder="Add a new task..."
        autocomplete="off"
      />
      <button id="add-btn">Add</button>
    </div>
    <ul id="task-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
